<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>แผนที่สวนกาแฟ</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../../assets/css/style.css"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script></head><body><div id="nav"></div><main class="max-w-7xl mx-auto px-5 py-10"><h1 class="text-4xl font-extrabold text-emerald-900">แผนที่ตำแหน่งสวนกาแฟ</h1><p class="text-slate-500 mt-2">ใช้ Leaflet.js เรียกข้อมูลพิกัดจาก Backend API</p><div class="card p-3 mt-6"><div id="map" style="height:620px;border-radius:22px"></div></div></main><script src="../../assets/js/api.js"></script><script>document.getElementById('nav').innerHTML=publicNav();const map=L.map('map').setView([17.48,101.36],9);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);async function load(){const farms=await api('/farms'); farms.forEach(f=>{if(f.latitude&&f.longitude){L.marker([f.latitude,f.longitude]).addTo(map).bindPopup(`<b>${f.farm_name}</b><br>${f.district}<br>${f.coffee_name||''}<br>${f.area_size||0} ไร่`)}})}load()</script></body></html>
