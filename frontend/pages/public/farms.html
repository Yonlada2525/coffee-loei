<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>สวนกาแฟ</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../../assets/css/style.css"></head><body><div id="nav"></div><main class="max-w-7xl mx-auto px-5 py-10"><div class="flex flex-col md:flex-row gap-4 justify-between"><div><h1 class="text-4xl font-extrabold text-emerald-900">ค้นหาสวนกาแฟจังหวัดเลย</h1><p class="text-slate-500 mt-2">แสดงข้อมูลจาก Backend API พร้อมรูปสวนตัวอย่างจากฐานข้อมูล media</p></div><div class="card p-3 flex gap-2"><input id="district" class="input" placeholder="ค้นหาอำเภอ"><input id="coffee" class="input" placeholder="พันธุ์กาแฟ"><button onclick="loadFarms()" class="btn btn-primary">ค้นหา</button></div></div><div id="farmGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8"></div></main><script src="../../assets/js/api.js"></script><script>document.getElementById('nav').innerHTML=publicNav();async function loadFarms(){const q=new URLSearchParams(); if(district.value)q.set('district',district.value); if(coffee.value)q.set('coffee',coffee.value); const farms=await api('/farms?'+q.toString()); const media=await api('/media'); farmGrid.innerHTML=farms.map((f,i)=>{const m=media.find(x=>x.farm_id===f.farm_id); return `<article class="card overflow-hidden"><img src="${assetPath(m?.file_path||'frontend/assets/images/farm-'+((i%5)+1)+'.svg')}" class="h-56 w-full object-cover"><div class="p-6"><span class="badge">${f.district||'-'}</span><h2 class="text-2xl font-extrabold mt-3 text-emerald-900">${f.farm_name}</h2><p class="text-slate-500 mt-2">เจ้าของ: ${f.fullname||'-'} · ${f.coffee_name||'-'} · ${f.area_size||0} ไร่</p><p class="mt-3 text-slate-700 line-clamp-2">${f.description||''}</p><a class="btn btn-primary mt-5" href="map.html?farm=${f.farm_id}">ดูบนแผนที่</a></div></article>`}).join('')||'<p>ไม่พบข้อมูล</p>'}loadFarms()</script></body></html>
