<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>สมัครสมาชิก</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../../assets/css/style.css"></head><body class="bg-green-50"><main class="max-w-xl mx-auto p-6 mt-8 card"><h1 class="text-2xl font-bold text-green-900 mb-4">สมัครบัญชีเจ้าของสวน</h1><form id="form" class="grid gap-3"><input class="input" name="username" placeholder="ชื่อผู้ใช้"><input class="input" name="password" type="password" placeholder="รหัสผ่าน"><input class="input" name="fullname" placeholder="ชื่อ-นามสกุล"><input class="input" name="phone" placeholder="เบอร์โทร"><input class="input" name="email" placeholder="อีเมล"><textarea class="input" name="address" placeholder="ที่อยู่"></textarea><button class="btn btn-green">สมัครสมาชิก</button></form></main><script src="../../assets/js/api.js"></script><script>form.onsubmit=async e=>{e.preventDefault();try{alert((await api('/auth/register',{method:'POST',body:Object.fromEntries(new FormData(form))})).message);location.href='login.html'}catch(err){alert(err.message)}};</script></body></html>
