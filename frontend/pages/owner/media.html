<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>อัปโหลดรูป</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../../assets/css/style.css"></head><body class="bg-green-50"><main class="max-w-4xl mx-auto p-6"><h1 class="text-2xl font-bold text-green-900 mb-4">อัปโหลดรูปภาพสวนกาแฟ</h1><form id="form" class="card grid gap-3"><select id="farm_id" class="input" name="farm_id"></select><input class="input" name="file" type="file"><button class="btn btn-green">อัปโหลด</button></form><div id="list" class="grid md:grid-cols-3 gap-4 mt-4"></div></main><script src="../../assets/js/api.js"></script><script src="../../assets/js/owner.js"></script><script>initOwner();async function load(){const farms=await api('/farms/mine');farm_id.innerHTML=farms.map(f=>`<option value='${f.farm_id}'>${f.farm_name}</option>`).join('');const rows=await api('/media');list.innerHTML=rows.map(m=>`<div class='card'><img src='http://localhost:5000${m.file_path}' class='w-full h-40 object-cover rounded'><p>Farm ID: ${m.farm_id}</p></div>`).join('')}form.onsubmit=async e=>{e.preventDefault();const fd=new FormData(form);await api('/media',{method:'POST',body:fd});form.reset();load()};load();</script></body></html>
