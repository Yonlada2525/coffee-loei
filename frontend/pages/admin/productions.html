<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ผลผลิต</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../../assets/css/style.css"></head><body class="bg-green-50"><main class="max-w-7xl mx-auto p-6"><h1 class="text-2xl font-bold text-green-900 mb-4">จัดการผลผลิต</h1><form id="form" class="card grid md:grid-cols-4 gap-3 mb-4"><input type="hidden" name="id"><select id="farm_id" class="input" name="farm_id"></select><select id="coffee_id" class="input" name="coffee_id"></select><input class="input" name="harvest_year" type="date"><input class="input" name="jan_quantity" type="number" step="0.01" placeholder="ม.ค."><input class="input" name="feb_quantity" type="number" step="0.01" placeholder="ก.พ."><input class="input" name="mar_quantity" type="number" step="0.01" placeholder="มี.ค."><button class="btn btn-green">บันทึก</button></form><div class="card overflow-auto"><table class="table"><tbody id="tbody"></tbody></table></div></main><script src="../../assets/js/api.js"></script><script src="../../assets/js/admin.js"></script><script>initAdmin();async function setup(){const farms=await api('/farms');farm_id.innerHTML=farms.map(f=>`<option value='${f.farm_id}'>${f.farm_name}</option>`).join('');await fillSelect('coffee_id','/coffee-types','coffee_name','coffee_id');load()}async function load(){const rows=await api('/productions');tbody.innerHTML=rows.map(r=>`<tr><td>${r.farm_name}</td><td>${r.coffee_name}</td><td>${r.harvest_year}</td><td>${r.quantity_kg} กก.</td><td><button class='btn btn-blue' onclick='edit(${JSON.stringify(r)})'>แก้ไข</button> <button class='btn btn-red' onclick='del(${r.production_id})'>ลบ</button></td></tr>`).join('')}function edit(r){for(const [k,v] of Object.entries(r)){if(form[k]) form[k].value=(v??'').toString().slice(0,10)}form.id.value=r.production_id}async function del(id){if(confirm('ลบ?')){await api('/productions/'+id,{method:'DELETE'});load()}}form.onsubmit=async e=>{e.preventDefault();const b=Object.fromEntries(new FormData(form));const id=b.id;delete b.id;await api('/productions'+(id?'/'+id:''),{method:id?'PUT':'POST',body:b});form.reset();load()};setup();</script></body></html>
