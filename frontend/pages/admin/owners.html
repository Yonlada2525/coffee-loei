<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>จัดการเจ้าของสวน</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../../assets/css/style.css"></head><body class="bg-green-50"><main class="max-w-7xl mx-auto p-6"><h1 class="text-2xl font-bold text-green-900 mb-4">จัดการเจ้าของสวน</h1><form id="form" class="card grid md:grid-cols-4 gap-3 mb-4"><input type="hidden" name="id"><input class="input" name="username" placeholder="username"><input class="input" name="password" placeholder="password"><input class="input" name="fullname" placeholder="ชื่อ"><input class="input" name="phone" placeholder="เบอร์"><input class="input" name="email" placeholder="อีเมล"><input class="input" name="address" placeholder="ที่อยู่"><select class="input" name="status"><option value="approved">approved</option><option value="pending">pending</option></select><button class="btn btn-green">บันทึก</button></form><div class="card overflow-auto"><table class="table"><thead><tr><th>ชื่อ</th><th>โทร</th><th>อีเมล</th><th>สถานะ</th><th>จัดการ</th></tr></thead><tbody id="tbody"></tbody></table></div></main><script src="../../assets/js/api.js"></script><script src="../../assets/js/admin.js"></script><script>initAdmin();async function load(){const rows=await api('/owners');tbody.innerHTML=rows.map(r=>`<tr><td>${r.fullname}</td><td>${r.phone||''}</td><td>${r.email||''}</td><td>${r.status}</td><td><button class='btn btn-blue' onclick='edit(${JSON.stringify(r)})'>แก้ไข</button> <button class='btn btn-red' onclick='del(${r.owner_id})'>ลบ</button></td></tr>`).join('')}function edit(r){form.id.value=r.owner_id;form.username.value=r.username;form.fullname.value=r.fullname;form.phone.value=r.phone;form.email.value=r.email;form.address.value=r.address;form.status.value=r.status}async function del(id){if(confirm('ลบ?')){await api('/owners/'+id,{method:'DELETE'});load()}}form.onsubmit=async e=>{e.preventDefault();const b=Object.fromEntries(new FormData(form));const id=b.id;delete b.id;if(id){await api('/owners/'+id,{method:'PUT',body:b})}else{await api('/owners',{method:'POST',body:b})}form.reset();load()};load();</script></body></html>
