<!doctype html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="bg-green-50">
    <main class="max-w-7xl mx-auto p-6">
        <h1 class="text-2xl font-bold text-green-900 mb-4">Dashboard ผู้ดูแลระบบ</h1>

        <div id="cards" class="grid md:grid-cols-4 gap-4"></div>

        <div class="grid md:grid-cols-2 gap-4 mt-4">
            <div class="card">
                <canvas id="districtChart"></canvas>
            </div>
            <div class="card">
                <canvas id="coffeeChart"></canvas>
            </div>
        </div>
    </main>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/admin.js"></script>
    <script>
        initAdmin();

        api('/reports/summary').then(s => {
            cards.innerHTML = [
                ['จำนวนสวน', s.total_farms],
                ['เจ้าของสวน', s.total_owners],
                ['พื้นที่รวม', s.total_area + ' ไร่'],
                ['ผลผลิตรวม', s.total_production + ' กก.']
            ].map(x => `<div class='card'>
                <p>${x[0]}</p>
                <b class='text-3xl text-green-900'>${x[1]}</b>
            </div>`).join('');

            new Chart(districtChart, {
                type: 'bar',
                data: {
                    labels: s.byDistrict.map(x => x.district),
                    datasets: [{
                        label: 'จำนวนสวน',
                        data: s.byDistrict.map(x => x.total)
                    }]
                }
            });

            new Chart(coffeeChart, {
                type: 'pie',
                data: {
                    labels: s.byCoffee.map(x => x.coffee_name),
                    datasets: [{
                        label: 'ผลผลิต',
                        data: s.byCoffee.map(x => x.total)
                    }]
                }
            });
        });
    </script>
</body>
</html>
